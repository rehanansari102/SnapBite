name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ── Order Service ────────────────────────────────────────────────────────────
  test-order-service:
    name: Order Service — Type Check + Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Type check
        run: pnpm --filter @snapbite/order-service exec tsc --noEmit
      - name: Unit tests
        run: pnpm --filter @snapbite/order-service test:ci
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: order-service-coverage
          path: apps/order-service/coverage/

  # ── Auth Service ─────────────────────────────────────────────────────────────
  test-auth-service:
    name: Auth Service — Type Check + Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Type check
        run: pnpm --filter @snapbite/auth-service exec tsc --noEmit
      - name: Unit tests
        run: pnpm --filter @snapbite/auth-service test:ci

  # ── Menu Service ─────────────────────────────────────────────────────────────
  test-menu-service:
    name: Menu Service — Type Check + Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
