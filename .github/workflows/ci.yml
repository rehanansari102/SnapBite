      - name: Unit tests
        run: pnpm --filter @snapbite/menu-service test:ci

  # ── Media Service ────────────────────────────────────────────────────────────
  test-media-service:
    name: Media Service — Type Check + Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Type check
        run: pnpm --filter @snapbite/media-service exec tsc --noEmit
      - name: Unit tests
        run: pnpm --filter @snapbite/media-service test:ci

  # ── Restaurant Service ───────────────────────────────────────────────────────
  typecheck-restaurant-service:
    name: Restaurant Service — Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Type check
        run: pnpm --filter @snapbite/restaurant-service exec tsc --noEmit

  # ── API Gateway ───────────────────────────────────────────────────────────────
  typecheck-api-gateway:
    name: API Gateway — Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Type check
        run: pnpm --filter @snapbite/api-gateway exec tsc --noEmit

  # ── Frontend ──────────────────────────────────────────────────────────────────
  typecheck-frontend:
    name: Frontend — Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Type check
        run: pnpm --filter @snapbite/frontend exec tsc --noEmit

  # ── Gate — all checks must pass ───────────────────────────────────────────────
  all-checks-pass:
    name: All checks passed
    runs-on: ubuntu-latest
    needs:
      - test-order-service
      - test-auth-service
      - test-menu-service
      - test-media-service
      - typecheck-restaurant-service
      - typecheck-api-gateway
      - typecheck-frontend
    steps:
      - run: echo "All CI checks passed ✓"
